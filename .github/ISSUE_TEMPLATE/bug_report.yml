name: Bug Report
description: Report a bug or issue
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!

  - type: dropdown
    id: type
    attributes:
      label: Installation Type
      description: How are you using Downlove?
      options:
        - Chrome Extension
        - Firefox Extension
        - Userscript (Tampermonkey/Violentmonkey/Greasemonkey)
        - CLI (bash script)
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: Which version are you using? (visible in the extension manager, userscript header, or CLI header)
      placeholder: "e.g. 1.0.0"
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser and Version
      description: Which browser are you using? (N/A for CLI)
      placeholder: "e.g. Chrome 120.0.6099.129, Firefox 121.0, N/A"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear description of the issue
      placeholder: "The download button does not appear on the project page..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Log in to lovable.dev
        2. Open a project
        3. Click the Download project button
        4. Observe that...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should happen instead?
      placeholder: "The ZIP file should download with all project files..."
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Console Logs (optional)
      description: |
        If available, paste console logs from your browser DevTools (F12, Console tab) or CLI stderr output.
        Tip: You can attach images by dragging them into this area.
      render: shell

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other useful context (screenshots, project size, specific configuration, etc.)
