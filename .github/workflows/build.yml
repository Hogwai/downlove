name: Build Validation

on:
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build all targets
        run: |
          BUILD_TARGET=chrome npx rollup -c
          BUILD_TARGET=firefox npx rollup -c
          BUILD_TARGET=userscript npx rollup -c

      - name: Verify builds
        run: |
          test -f dist/chrome/content.js || exit 1
          test -f dist/chrome/popup.js || exit 1
          test -f dist/chrome/popup.html || exit 1
          test -f dist/chrome/manifest.json || exit 1
          test -f dist/firefox/content.js || exit 1
          test -f dist/firefox/popup.js || exit 1
          test -f dist/firefox/popup.html || exit 1
          test -f dist/firefox/manifest.json || exit 1
          test -f dist/downlove.user.js || exit 1
          echo "All builds completed successfully"

      - name: Run sanity checks
        run: node scripts/sanity.js
